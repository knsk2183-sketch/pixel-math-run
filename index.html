<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pixel Math Run</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #333; }
        #game-container { border: 2px solid #fff; }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
// --- タイトルシーン ---
class TitleScene extends Phaser.Scene {
    constructor() { super('TitleScene'); }
    preload() { 
        this.load.image('james_title', 'james.png'); 
        this.load.image('title_logo', 'title_logo.png');
        this.load.image('start_btn', 'start_btn.png');
        this.load.audio('bgm', 'Titlesong.mp3');
        this.load.audio('start', 'start.mp3'); // 効果音の読み込み
        this.load.image('title_back', 'titleback.jpg');
    }
    create() {
    this.add.image(200, 300, 'title_back').setDisplaySize(400, 600);
    
    if (this.sound.get('bgm')) this.sound.removeByKey('bgm');
    this.bgm = this.sound.add('bgm', { loop: true, volume: 0.5 });
    this.bgm.play();

    // 枠線（200, 300の位置に配置されているので、これを基準に調整します）
    this.add.rectangle(200, 300, 360, 560).setStrokeStyle(10, 0xFFFFFF);

    // 1. タイトルロゴ（枠内の上部）
    this.add.sprite(200, 160, 'title_logo').setScale(0.28); 

    // 2. ジェームズ（中央）
    this.add.sprite(200, 330, 'james_title').setScale(0.15);

    // 3. 最高スコア（ジェームズの下）
    let currentHighScore = localStorage.getItem('pixelMathHighScore') || 0;
    this.add.text(200, 430, '最高スコア: ' + currentHighScore, { 
        fontSize: '16px', color: '#000000', stroke: '#FFFFFF', strokeThickness: 4 
    }).setOrigin(0.5);
    
    // --- 4. スタートボタン（画像）の設定 ---
    const btnX = 200;
    const btnY = 500;
    const originalScale = 0.18;
    
    const startBtnImg = this.add.sprite(btnX, btnY, 'start_btn')
        .setScale(originalScale)
        .setInteractive();
    
    // 【イベントA：ボタンを押したとき】
    startBtnImg.on('pointerdown', () => {
        // 1. 縮小する (少し小さく)
        startBtnImg.setScale(originalScale * 0.9);
        // 2. 暗くする (灰色っぽい色を重ねて暗く見せる)
        startBtnImg.setTint(0xaaaaaa);
        
        // 効果音再生とシーン遷移は、指を離した時に行うのが一般的ですが、
        // 押した瞬間に反応させたい場合はここに書いてもOKです。
        // 今回は「押した感触」を優先し、ここには処理を入れず、
        // pointerup または pointerout で遷移させます。
    });

    // 【イベントB：ボタンの上で指を離したとき（クリック確定）】
    startBtnImg.on('pointerup', () => {
        // 元のサイズと色に戻す
        startBtnImg.setScale(originalScale);
        startBtnImg.clearTint();

        // --- 画面遷移の処理 ---
        this.sound.play('start');
        this.bgm.stop();
        this.scene.start('GameScene', { score: 0 });
    });

    // 【イベントC：ボタンの上から指が外れたとき（キャンセル）】
    startBtnImg.on('pointerout', () => {
        // 枠外に指が外れたら、押した状態をキャンセルして見た目を元に戻す
        startBtnImg.setScale(originalScale);
        startBtnImg.clearTint();
    });
}
}

// --- ゲームシーン ---
class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }
    init(data) { this.score = data.score || 0; }
    
    preload() {
        this.load.image('penguin1', 'penguin1.png');
        this.load.image('penguin2', 'penguin2.png');
        this.load.audio('correct', 'correct.mp3');
        this.load.audio('gameover', 'gameover.mp3');
        this.load.image('cloud', 'clag.png');
        this.load.image('tree', 'tree.png');
        this.load.audio('game_bgm', 'gamebgm.mp3');
    }

    create() {
        if (!this.bgm) {
            this.bgm = this.sound.add('game_bgm', { loop: true, volume: 0.5 });
            this.bgm.play();
        }
        
        this.cameras.main.setBackgroundColor('#87CEEB');
        this.add.image(80, 100, 'cloud').setScale(0.3);
        this.add.image(320, 100, 'cloud').setScale(0.3);
        
        this.trees = [];
        this.trees.push(this.add.image(100, 450, 'tree').setScale(0.4));
        this.trees.push(this.add.image(300, 450, 'tree').setScale(0.4));
        
        this.add.rectangle(200, 550, 400, 100, 0x7cfc00);
        this.scoreText = this.add.text(20, 20, 'スコア: ' + this.score, { fontSize: '20px', color: '#000' });
        
        this.anims.create({ key: 'walk_anim', frames: [{ key: 'penguin1' }, { key: 'penguin2' }], frameRate: 3, repeat: -1 });
        this.add.sprite(100, 470, 'penguin1').setScale(0.2).play('walk_anim');
        
        // create() 内のタイマー設定
this.timer = 5;
this.timerBarBg = this.add.rectangle(200, 80, 300, 20, 0x333333);
this.timerBar = this.add.rectangle(50, 80, 300, 20, 0x00FF00).setOrigin(0, 0.5);

// タイマーイベントを関数として定義
this.startTimer = () => {
    this.timer = 5; // 5秒にリセット
    this.timerBar.width = 300; // バーも最大に
    
    // 既にイベントがあれば削除
    if (this.timerEvent) this.timerEvent.remove();
    
    // 新しくイベントを作成
    this.timerEvent = this.time.addEvent({ 
        delay: 1000, 
        callback: () => {
            this.timer--;
            this.timerBar.width = (this.timer / 5) * 300;
            if (this.timer <= 0) {
                this.bgm.stop();
                this.bgm = null;
                this.sound.play('gameover');
                this.scene.start('GameOverScene', { score: this.score });
            }
        }, 
        loop: true 
    });
};

// ゲーム開始時にスタート
this.startTimer();
        
        // 初期化
        this.optionButtons = [];
        this.generateQuestion();
    }
    
    update() {
        this.trees.forEach(tree => {
            tree.x -= 2;
            if (tree.x < -50) tree.x = 450; 
        });
    }

    // --- 掃除関数 ---
    cleanupQuestions() {
        if (this.levelText) this.levelText.destroy();
        if (this.bubble) this.bubble.destroy();
        if (this.questionText) this.questionText.destroy();
        this.optionButtons.forEach(btn => btn.destroy());
        this.optionButtons = [];
    }

    generateQuestion() {
        this.cleanupQuestions(); // 常に掃除してから描画

        let correctCount = this.score / 100;
        let level = Math.min(Math.floor(correctCount / 20) + 1, 5);
        let minNum = 1, maxNum = 10;
        if (level === 2) maxNum = 30;
        else if (level === 3) maxNum = 60;
        else if (level >= 4) {
            maxNum = 99;
            if (level === 5) { minNum = 10; maxNum = 200; }
        }
        let n1 = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
        let n2 = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
        let answer = n1 + n2;
        
        this.levelText = this.add.text(350, 20, 'Lv.' + level, { fontSize: '20px', color: '#FF4500' }).setOrigin(0.5);
        
        this.bubble = this.add.graphics();
        this.bubble.fillStyle(0xFFFFFF, 1);
        this.bubble.fillRoundedRect(100, 100, 200, 60, 10);
        this.questionText = this.add.text(200, 130, `${n1} + ${n2} = ?`, { fontSize: '20px', color: '#000' }).setOrigin(0.5);
        
        let options = [answer, answer + Math.floor(Math.random()*20)+5, answer - Math.floor(Math.random()*15)-1, answer + Math.floor(Math.random()*40)+10].sort(() => Math.random() - 0.5);
        
        options.forEach((opt, i) => {
            let btn = this.add.text(80 + (i * 80), 300, opt.toString(), { 
                fontSize: '24px', backgroundColor: '#FF6B81', padding: { x: 15, y: 10 } 
            }).setOrigin(0.5).setInteractive();

            btn.on('pointerdown', () => {
    if (opt === answer) {
        this.sound.play('correct', { volume: 0.3 }) 
        this.score += 100;
        this.scoreText.setText('スコア: ' + this.score);
        
        // --- ここでタイマーを完全にリセット！ ---
        this.startTimer(); 
        
        this.generateQuestion();
    } else {
        // 間違えたとき（既存の処理）
        this.bgm.stop();
        this.bgm = null;
        this.sound.play('gameover');
        this.scene.start('GameOverScene', { score: this.score });
    }
});
            this.optionButtons.push(btn); // ボタンを記録
        });
    }
}

// --- ゲームオーバーシーン ---
class GameOverScene extends Phaser.Scene {
    constructor() { super('GameOverScene'); }
    init(data) { this.score = data.score; }
    create() {
        if (this.score > (localStorage.getItem('pixelMathHighScore') || 0)) localStorage.setItem('pixelMathHighScore', this.score);
        this.cameras.main.setBackgroundColor('#000000');
        this.add.text(200, 250, 'GAME OVER', { fontSize: '32px', color: '#FF0000' }).setOrigin(0.5);
        this.add.text(200, 300, '今回のスコア: ' + this.score, { fontSize: '24px', color: '#FFFFFF' }).setOrigin(0.5);
        this.add.text(200, 400, 'タップでタイトルへ', { fontSize: '16px', color: '#FFFF00' }).setOrigin(0.5);
        this.input.once('pointerdown', () => this.scene.start('TitleScene'));
    }
}

const config = { type: Phaser.AUTO, width: 400, height: 600, parent: 'game-container', scene: [TitleScene, GameScene, GameOverScene] };
const game = new Phaser.Game(config);
</script>
</body>
</html>
